###################################################
# Development environment for the todo app (3-tier architecture).
#
# Three application images are built from their own build context:
#   - client  (./client)  → React SPA (Vite dev server here, nginx in prod)
#   - backend (./backend) → todo-items API
#   - auth    (./auth)    → authentication API
#
# A Traefik reverse proxy fronts them so everything is reachable on a single
# origin (http://localhost:${APP_PORT}), which lets the browser send the auth
# cookie to every service. Routing (most specific rule wins):
#   /api/auth/*  → auth     (port 3001)
#   /api/*       → backend  (port 3000)
#   /*           → client   (port 5173)
#
# phpMyAdmin (db.localhost) is included for debugging the shared MySQL database.
###################################################

services:

  ###################################################
  # Service: proxy — Traefik reverse proxy / router.
  ###################################################
  proxy:
    image: traefik:v3.6
    command: --providers.docker
    ports:
      # Port hôte configurable (défaut 8080) pour éviter les conflits si un autre
      # service occupe déjà le port 80. L'app sera sur http://localhost:${APP_PORT:-8080}
      - ${APP_PORT:-8080}:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ###################################################
  # Service: auth — authentication API (/api/auth/*).
  #
  # Owns the `users` table. Issues JWT cookies that the backend verifies
  # locally with the shared JWT_SECRET (stateless, no cross-service call).
  ###################################################
  auth:
    build:
      context: ./auth
      target: dev
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_DB: ${MYSQL_DB:-todos}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        - path: ./auth/src
          action: sync
          target: /usr/local/app/src
        - path: ./auth/package.json
          action: rebuild
    labels:
      # More specific than /api, so this router must win for /api/auth/*.
      traefik.http.routers.auth.rule: Host(`localhost`) && PathPrefix(`/api/auth`)
      traefik.http.routers.auth.priority: "20"
      traefik.http.services.auth.loadbalancer.server.port: 3001

  ###################################################
  # Service: backend — todo-items API (/api/*).
  #
  # Owns the `todo_items` table. Verifies the auth JWT locally.
  ###################################################
  backend:
    build:
      context: ./backend
      target: dev
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_DB: ${MYSQL_DB:-todos}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/src
          action: sync
          target: /usr/local/app/src
        - path: ./backend/package.json
          action: rebuild
    labels:
      traefik.http.routers.backend.rule: Host(`localhost`) && PathPrefix(`/api`)
      traefik.http.routers.backend.priority: "10"
      traefik.http.services.backend.loadbalancer.server.port: 3000

  ###################################################
  # Service: client — React SPA (Vite dev server).
  ###################################################
  client:
    build:
      context: ./client
      target: dev
    develop:
      watch:
        - path: ./client/src
          action: sync
          target: /usr/local/app/src
        - path: ./client/package.json
          action: rebuild
    labels:
      traefik.http.routers.client.rule: Host(`localhost`)
      traefik.http.routers.client.priority: "1"
      traefik.http.services.client.loadbalancer.server.port: 5173

  ###################################################
  # Service: mysql — shared database for auth + backend.
  ###################################################
  mysql:
    image: mysql:9.3
    volumes:
      - todo-mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DB:-todos}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  ###################################################
  # Service: phpmyadmin — web UI for the database (db.localhost).
  ###################################################
  phpmyadmin:
    image: phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-root}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-secret}
    labels:
      traefik.http.routers.phpmyadmin.rule: Host(`db.localhost`)
      traefik.http.services.phpmyadmin.loadbalancer.server.port: 80

###################################################
# Volumes — only MySQL needs persistence.
###################################################
volumes:
  todo-mysql-data:
