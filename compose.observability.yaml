###################################################
# Observability overlay.
#
# Adds Prometheus (metrics), Loki (log storage), Promtail (log shipping) and
# Grafana (dashboards) on top of the application stack.
#
# Run together with the base compose file:
#   docker compose -f compose.yaml -f compose.observability.yaml up
#
# UIs:
#   Grafana    -> http://localhost:3001  (admin / admin)
#   Prometheus -> http://localhost:9090
###################################################
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 9090:9090

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - 3100:3100

  promtail:
    image: grafana/promtail:3.2.1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - 3001:3000
    depends_on:
      - prometheus
      - loki

volumes:
  loki-data:
  grafana-data:
