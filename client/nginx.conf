# Nginx config for the React SPA.
#
# Static assets are served directly; every unknown path falls back to
# index.html so client-side routing (React Router) works on refresh/deep links.
# API calls use relative paths (/api/...) and are routed to the backend/auth
# services by the upstream reverse proxy (Traefik in compose, ingress-nginx in
# Kubernetes) — nginx here only serves the frontend.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
