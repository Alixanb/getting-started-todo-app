# Demo secret. In a real cluster, do NOT commit secrets — create them with
#   kubectl create secret generic todo-secret -n todo \
#     --from-literal=JWT_SECRET=... --from-literal=MYSQL_USER=... \
#     --from-literal=MYSQL_PASSWORD=...
# or use a sealed-secrets / external secrets operator.
apiVersion: v1
kind: Secret
metadata:
  name: todo-secret
  namespace: todo
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-use-a-64-byte-random-hex"
  MYSQL_USER: "root"
  MYSQL_PASSWORD: "secret"
