apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: todo
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        # Picked up by the Prometheus pod-scrape config (see k8s/observability).
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          # Built and pushed by .github/workflows/ci.yml.
          # GitHub owner is "alixanb" (lowercase, must match the image tag).
          image: ghcr.io/alixanb/getting-started-todo-app-backend:latest
          # IfNotPresent : en local, l'image construite avec `docker build`
          # est réutilisée (Docker Desktop partage son démon avec le cluster)
          # au lieu d'être tirée depuis GHCR.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: NODE_ENV
            # Database-per-service: the backend (task) owns task-mysql.
            - name: MYSQL_HOST
              value: task-mysql
            # Cache-aside (Redis) and message bus (Kafka). Enabled by presence.
            - name: REDIS_HOST
              value: task-redis
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: MYSQL_DB
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: MYSQL_DB
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: LOG_LEVEL
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: MYSQL_PASSWORD
            # Shared with the auth service so JWTs issued by auth verify here.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
