apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: todo
data:
  # Kong DB-less declarative config. Same routing as gateway/kong.yml, but the
  # frontend upstream is the in-cluster nginx Service (frontend:80) instead of
  # the Vite dev container.
  kong.yml: |
    _format_version: "3.0"

    services:
      - name: auth
        url: http://auth:3001
        routes:
          - name: auth-route
            paths:
              - /api/auth
            strip_path: false

      - name: task
        url: http://backend:3000
        routes:
          - name: task-route
            paths:
              - /api
            strip_path: false
          # Expose les sondes santé du backend publiquement (plus spécifique que
          # la route "/" du frontend, donc prioritaire pour ces chemins exacts).
          - name: health-route
            paths:
              - /health
              - /ready
            strip_path: false

      - name: frontend
        url: http://frontend:80
        routes:
          - name: frontend-route
            paths:
              - /
            strip_path: false

    plugins:
      - name: cors
        config:
          origins:
            - "*"
          credentials: true
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
      - name: rate-limiting
        config:
          minute: 1000
          policy: local
