apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
  namespace: todo
spec:
  ingressClassName: nginx
  rules:
    - host: todo.localhost
      http:
        paths:
          # The edge ingress forwards everything to the Kong API Gateway, which
          # performs the internal routing (/api/auth → auth, /api → backend,
          # / → frontend) and applies its plugins.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong
                port:
                  number: 8000
