apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: todo
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
      annotations:
        # Picked up by the Prometheus pod-scrape config (see k8s/observability).
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: auth
          # Built and pushed by .github/workflows/ci.yml.
          # GitHub owner is "alixanb" (lowercase, must match the image tag).
          image: ghcr.io/alixanb/getting-started-todo-app-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: NODE_ENV
            # Database-per-service: the auth service owns auth-mysql.
            - name: MYSQL_HOST
              value: auth-mysql
            # Cache-aside (Redis) and message bus (Kafka). Enabled by presence.
            - name: REDIS_HOST
              value: auth-redis
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: MYSQL_DB
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: MYSQL_DB
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: JWT_EXPIRES_IN
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: LOG_LEVEL
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: MYSQL_PASSWORD
            # Shared with the backend service so the JWTs issued here verify there.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
