apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-redis
  namespace: todo
  labels:
    app: task-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-redis
  template:
    metadata:
      labels:
        app: task-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
