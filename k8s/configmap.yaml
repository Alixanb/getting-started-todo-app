apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-config
  namespace: todo
data:
  NODE_ENV: "production"
  # Database-per-service: MYSQL_HOST is set per deployment (auth-mysql / task-mysql),
  # not here. Both databases use the same database name.
  MYSQL_DB: "todos"
  JWT_EXPIRES_IN: "7d"
  LOG_LEVEL: "info"
