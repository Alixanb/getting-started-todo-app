apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-config
  namespace: todo
data:
  # "development" pour que le cookie d'auth ne soit pas marqué Secure :
  # le LoadBalancer Kong sert en HTTP simple (pas de TLS), un cookie Secure
  # ne serait jamais renvoyé par le navigateur.
  NODE_ENV: "development"
  # Database-per-service: MYSQL_HOST is set per deployment (auth-mysql / task-mysql),
  # not here. Both databases use the same database name.
  MYSQL_DB: "todos"
  JWT_EXPIRES_IN: "7d"
  LOG_LEVEL: "info"
