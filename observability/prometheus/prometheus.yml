global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # The todo backend exposes Prometheus metrics at /metrics.
  - job_name: todo-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:3000"]
