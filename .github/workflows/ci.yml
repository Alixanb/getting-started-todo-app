name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — Backend tests
  # ────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — Auth tests
  # ────────────────────────────────────────────────────────────────────────────
  test-auth:
    name: Auth tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: auth/package-lock.json

      - name: Install dependencies
        working-directory: auth
        run: npm ci

      - name: Run tests with coverage
        working-directory: auth
        run: npm run test:coverage

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — Frontend lint + tests
  # ────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend lint & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run tests with coverage
        working-directory: client
        run: npm run test:coverage

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 — Build the three Docker images & push to GHCR
  # Requires all test jobs to succeed. One image per service.
  # Uses the built-in GITHUB_TOKEN — no extra secrets needed.
  # One-time setup: Settings > Actions > Workflow permissions → "Read and write"
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test-backend, test-auth, test-frontend]
    # Only push from the main branch (not from PRs)
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            context: ./client
          - service: backend
            context: ./backend
          - service: auth
            context: ./auth

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/getting-started-todo-app-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
